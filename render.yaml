services:
  - type: web
    name: helpdesk-backend
    env: node
    buildCommand: npm install && node ace migration:run --force
    startCommand: node ace serve --production
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 3333
      - key: CACHE_VIEWS
        value: true
      - key: APP_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: helpdesk-db
          property: connectionString
      - key: DB_CONNECTION
        value: pg

  - type: postgres
    name: helpdesk-db
    databaseName: helpdesk_h82g
    user: helpdesk_h82g_user
